        body.dark-mode {

        .dark-mode footer h2 {

        .dark-mode footer p {

        .dark-mode-switch {
            position: absolute;
            right: 150px;
            top: 25px;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .dark-mode-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider1 {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--slider-bg);
            border-radius: 20px;
            transition: 0.4s;
        }

        .slider1:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: var(--white);
            border-radius: 50%;
            transition: 0.4s;
        }

        input:checked+.slider1 {
            background-color: var(--slider-active-bg);
        }

        input:checked+.slider1:before {
            transform: translateX(20px);
        }

        .lesson-card {
            background: linear-gradient(135deg, #008080 0%, #00d9d9 100%);
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0, 128, 128, 0.2);
            width: 250px;
            height: 300px;
            perspective: 1000px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .lesson-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 128, 128, 0.3);
            border-color: #FF8C69;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .lesson-card:hover .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        }

        .card-front img {
            width: 120px;
            height: 120px;

            margin-bottom: 15px;
            border: 4px solid var(--primary-color);
            object-fit: cover;
        }

        .card-front h3 {

            margin: 0;

        }

        .card-back {
            background: linear-gradient(135deg, #FF8C69 0%, #FF6347 100%);
            color: var(--white);
            transform: rotateY(180deg);
            border-radius: 14px;
        }

        .card-back h3 {
            font-size: 1.1rem;
            margin: 0;
            font-weight: 700;
        }

        function goBack() {
            // Check if user came from parent dashboard

    </script>

            <i class="fab fa-whatsapp"></i> Chat on WhatsApp
        </a>
    </footer>

    <script>
        // Dark Mode Toggle Script
        const darkModeToggle = document.getElementById('darkModeToggle');
        const body = document.body;

        // Check localStorage for dark mode preference
        if (localStorage.getItem('darkMode') === 'enabled') {
            body.classList.add('dark-mode');
            darkModeToggle.checked = true;
        }

        // Add event listener to toggle switch
        darkModeToggle.addEventListener('change', () => {
            if (darkModeToggle.checked) {
                body.classList.add('dark-mode');
                localStorage.setItem('darkMode', 'enabled');
            } else {
                body.classList.remove('dark-mode');
                localStorage.setItem('darkMode', 'disabled');
            }
        });
    </script>
