<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Study is Funny</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" class="circular-icon" type="image/png" href="../images/logo.png">
    <script>
        // API Configuration for Hostinger subdirectory support
        function getApiBaseUrl() {
            const protocol = window.location.protocol;
            const host = window.location.host;
            const pathname = window.location.pathname;
            
            if (pathname.includes('study-is-funny')) {
                const basePathMatch = pathname.match(/^(.+?\/study-is-funny)\//);
                const basePath = basePathMatch ? basePathMatch[1] : '/study-is-funny';
                return `${protocol}//${host}${basePath}/api/`;
            }
            
            return `${protocol}//${host}/api/`;
        }
        
        window.API_BASE = getApiBaseUrl();
        console.log('✓ Admin API Base URL:', window.API_BASE);
        console.log('✓ Admin Login Location:', window.location.href);
    </script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="../images/logo.webp" alt="Logo" class="logo">
                <h1>Admin Dashboard</h1>
                <p>Study is Funny - Management Portal</p>
            </div>

            <form id="adminLoginForm" class="login-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input type="text" id="username" name="username" required placeholder="Enter admin username">
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" name="password" required placeholder="Enter admin password">
                </div>

                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login to Dashboard
                </button>
            </form>

            <div id="loginMessage" class="message"></div>
        </div>
    </div>

    <script>
        // Admin login functionality
        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('loginMessage');
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;

            if (!username || !password) {
                messageDiv.innerHTML = '<div class="error"><i class="fas fa-exclamation-triangle"></i> Please enter username and password</div>';
                return;
            }

            // Show loading state
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging In...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(window.API_BASE + 'admin.php?action=login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                // First, get the response text
                const responseText = await response.text();
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    console.error('JSON Parse Error:', parseError);
                    console.error('Response text:', responseText);
                    console.error('Response status:', response.status);
                    messageDiv.innerHTML = '<div class="error"><i class="fas fa-exclamation-triangle"></i> Invalid server response. Please check the console.</div>';
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                    return;
                }

                if (data.success && data.token) {
                    // Store token securely
                    sessionStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUsername', data.user.username);

                    messageDiv.innerHTML = '<div class="success"><i class="fas fa-check-circle"></i> Login successful! Redirecting...</div>';
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    messageDiv.innerHTML = '<div class="error"><i class="fas fa-exclamation-triangle"></i> ' + (data.message || 'Login failed') + '</div>';
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }

            } catch (error) {
                console.error('Login error:', error);
                messageDiv.innerHTML = '<div class="error"><i class="fas fa-exclamation-triangle"></i> Network error: ' + error.message + '</div>';
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
