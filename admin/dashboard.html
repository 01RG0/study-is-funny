<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Study is Funny</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" class="circular-icon" type="image/png" href="../images/logo.png">
    <script>
        // API Configuration for Hostinger subdirectory support
        function getApiBaseUrl() {
            const protocol = window.location.protocol;
            const host = window.location.host;
            const pathname = window.location.pathname;
            
            if (pathname.includes('study-is-funny')) {
                const basePathMatch = pathname.match(/^(.+?\/study-is-funny)\//);
                const basePath = basePathMatch ? basePathMatch[1] : '/study-is-funny';
                return `${protocol}//${host}${basePath}/api/`;
            }
            
            return `${protocol}//${host}/api/`;
        }
        
        window.APP_BASE_URL = getApiBaseUrl().replace('/api/', '/');
        console.log('✓ Admin API Base URL:', getApiBaseUrl());
        console.log('✓ Admin Location:', window.location.href);
    </script>
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="../images/logo.webp" alt="Logo" class="sidebar-logo">
            <h2>Admin Panel</h2>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item active">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </a>
            <a href="upload-session.php" class="nav-item">
                <i class="fas fa-upload"></i> Upload Session
            </a>
            <a href="manage-sessions.html" class="nav-item">
                <i class="fas fa-list"></i> Manage Sessions
            </a>
            <a href="manage-students.html" class="nav-item">
                <i class="fas fa-user-cog"></i> Manage Students
            </a>
            <a href="analytics.html" class="nav-item">

            </a>
            <a href="payment-review.html" class="nav-item">

            </a>
            <a href="settings.html" class="nav-item">

            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="logout-btn" onclick="logout()">

            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Dashboard Section -->
        <div class="content-section active">
            <div class="section-header">
                <h1><i class="fas fa-tachometer-alt"></i> Dashboard Overview</h1>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">

                    <div class="stat-info">
                        <h3 id="totalSessions">0</h3>

                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="stat-info">

                        <p>Registered Students</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-eye"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalViews">0</h3>
                        <p>Session Views</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-upload"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="uploadsToday">0</h3>

                    </div>
                </div>
            </div>

            <div class="recent-activity">
                <h2>Recent Activity</h2>
                <div class="activity-list" id="recentActivity">
                    <div class="activity-item">
                        <div class="activity-icon">
                            <i class="fas fa-upload"></i>
                        </div>
                        <div class="activity-content">
                            <p>New session uploaded: "Physics - Mechanics"</p>
                            <span class="activity-time">2 hours ago</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Auth check - prevent unauthorized access
        (function() {
            const token = sessionStorage.getItem('adminToken');
            if (!token) {
                window.location.href = 'login.html';
            }
        })();

        // Load pending payment count
        document.addEventListener('DOMContentLoaded', function() {
            loadPendingPaymentCount();
            // Refresh every 60 seconds
            setInterval(loadPendingPaymentCount, 60000);
        });

        function loadPendingPaymentCount() {
            fetch('../api/payment.php?action=get_pending_transactions')
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.count > 0) {
                        const badge = document.getElementById('pendingPaymentCount');
                        badge.textContent = data.count;
                        badge.style.display = 'inline-flex';
                    }
                })
                .catch(error => console.log('Payment notification check'));
        }
    </script>
    <script src="js/admin.js"></script>
</body>

</html>
